function svgStar(size,color,op){
  const r1=size/2,r2=size/4.2,cx=size/2,cy=size/2,pts=[];

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;overflow:visible"><polygon points="${pts.join(' ')}" fill="${color}" opacity="${op}" style="filter:drop-shadow(0 0 3px ${color})"/></svg>`;
}

    else{box.innerHTML=`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 20px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:26px">💀</span><p style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:600;color:rgba(240,230,211,0.3);letter-spacing:3px;margin:0">MOGGED TODAY</p></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><p style="font-size:11px;color:rgba(240,230,211,0.35);margin-bottom:2px">You</p><p style="font-size:18px;font-weight:500;color:${pc.color};margin:0">${fmtT(myT)}</p></div><p style="font-size:12px;color:#f87171;font-weight:500;margin:0">-${diff(myT,otherT)} behind</p><div style="text-align:right"><p style="font-size:11px;color:rgba(240,230,211,0.35);margin-bottom:2px">${oc.name}</p><p style="font-size:18px;font-weight:500;color:${oc.color};margin:0">${fmtT(otherT)}</p></div></div><button class="btn btn-ghost" style="width:100%;" onclick="renderDefeat()">See full result</button></div>`;}
  }else if(myT&&!otherT){
    box.innerHTML=`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(180,140,60,0.15);border-radius:14px;padding:20px;text-align:center"><div class="pls" style="font-size:32px;margin-bottom:10px;line-height:1">⏳</div><p style="font-family:'Rajdhani',sans-serif;font-size:22px;letter-spacing:2px;color:#f0e6d3;margin-bottom:4px;font-weight:600">Waiting for ${PC[o].name}...</p><p style="font-size:13px;color:rgba(240,230,211,0.35)">You woke at <strong style="color:#f0e6d3">${fmtT(myT)}</strong></p></div>`;
  }else{
    const otherFirst=!myT&&!!otherT;
    const inner=el("div",`background:rgba(255,255,255,0.04);border:1.5px solid ${pc.border};border-radius:14px;padding:18px 20px;`,"");
    if(otherFirst)inner.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:${oc.bg};border-radius:8px;border:1px solid ${oc.border}"><span style="font-size:16px">⚡</span><p style="margin:0;font-size:13px;color:${oc.color};font-weight:500">${oc.name} already entered ${fmtT(otherT)}</p></div>`;
    else inner.innerHTML=`<p style="margin:0 0 12px;font-size:14px;color:rgba(240,230,211,0.45)">What time did you wake up today?</p>`;
    const row=document.createElement("div");row.style.cssText="display:flex;gap:8px;";
    const inp=document.createElement("input");inp.type="time";inp.value=nowMelb();
    const btn=el("button","padding:10px 22px;border-radius:8px;border:none;background:"+pc.color+";color:#07071a;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;","Submit");
    btn.onclick=async()=>{
      if(!inp.value)return;btn.textContent="...";btn.disabled=true;
      const nd={...gameData,today:{...gameData.today,[player]:inp.value}};
      await saveData(nd);
      if(nd.today[other(player)]){if(calcW(nd.today.arif,nd.today.mere)===player)boom();render();}else render();
    };
    row.appendChild(inp);row.appendChild(btn);inner.appendChild(row);box.appendChild(inner);
  }
  return box;
}

function renderVictory(){
  const td=gameData.today,o=other(player),pc=PC[player],oc=PC[o];
  const allH=[...gameData.history,{...td,winner:calcW(td.arif,td.mere)}];
  const wins={arif:allH.filter(d=>d.winner==="arif").length,mere:allH.filter(d=>d.winner==="mere").length};
  const wrap=el("div","min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(160deg,rgba(21,128,61,0.15),rgba(21,128,61,0.04));","");
  const inner=document.createElement("div");inner.className="bIn";inner.style.cssText="text-align:center;width:100%;max-width:360px;";
  inner.innerHTML=`<div style="font-size:80px;line-height:1;margin-bottom:4px;filter:drop-shadow(0 0 20px #fbbf24)">🏆</div><h1 style="font-family:'Cinzel Decorative',serif;font-size:clamp(32px,7vw,56px);font-weight:900;color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,0.5);line-height:1;margin:8px 0 6px">You Mogged</h1><p style="font-family:'Rajdhani',sans-serif;font-size:20px;color:#86efac;letter-spacing:3px;margin-bottom:20px;font-weight:600">${pc.name.toUpperCase()} · ${fmtT(td[player])}</p><div style="background:rgba(21,128,61,0.18);border:1px solid rgba(74,222,128,0.3);border-radius:12px;padding:12px 24px;display:inline-block;margin-bottom:24px"><p style="margin:0;font-size:15px;color:#86efac;font-weight:500">Beat ${oc.name} by <strong>${diff(td.arif,td.mere)}</strong></p><p style="margin:4px 0 0;font-size:13px;color:rgba(134,239,172,0.6)">They woke at ${fmtT(td[o])}</p></div><div style="display:flex;gap:24px;justify-content:center;margin-bottom:28px">${[player,o].map(pid=>`<div style="text-align:center"><p style="font-family:'Rajdhani',sans-serif;font-size:52px;color:${PC[pid].color};margin:0;line-height:1;font-weight:600;text-shadow:0 0 20px ${PC[pid].color}88">${wins[pid]}</p><p style="font-size:11px;color:rgba(240,230,211,0.4);margin:2px 0 0;text-transform:uppercase;letter-spacing:1px">${PC[pid].name}</p></div>`).join("")}</div>`;
  const btn=el("button","","Keep the streak going →");btn.className="btn btn-gold";btn.onclick=renderMain;
  inner.appendChild(btn);wrap.appendChild(inner);setRoot(wrap);
}
function renderDefeat(){
  const td=gameData.today,o=other(player),pc=PC[player],oc=PC[o];
  const allH=[...gameData.history,{...td,winner:calcW(td.arif,td.mere)}];
  const wins={arif:allH.filter(d=>d.winner==="arif").length,mere:allH.filter(d=>d.winner==="mere").length};
  const wrap=el("div","min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;","");
  const inner=document.createElement("div");inner.className="shk";inner.style.cssText="text-align:center;width:100%;max-width:360px;";
  inner.innerHTML=`<div style="font-size:80px;line-height:1;margin-bottom:4px">💀</div><h1 style="font-family:'Cinzel Decorative',serif;font-size:clamp(32px,7vw,56px);font-weight:900;color:rgba(240,230,211,0.25);line-height:1;margin:8px 0 6px">Mogged.</h1><p style="font-family:'Rajdhani',sans-serif;font-size:20px;color:rgba(240,230,211,0.25);letter-spacing:3px;margin-bottom:20px;font-weight:600">${oc.name.toUpperCase()} WOKE AT ${fmtT(td[o])}</p><div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 24px;display:inline-block;margin-bottom:24px"><p style="margin:0;font-size:15px;color:rgba(240,230,211,0.4);font-weight:500">You woke at ${fmtT(td[player])} — lost by <strong>${diff(td.arif,td.mere)}</strong></p></div><div style="display:flex;gap:24px;justify-content:center;margin-bottom:28px">${[player,o].map(pid=>`<div style="text-align:center"><p style="font-family:'Rajdhani',sans-serif;font-size:52px;color:${PC[pid].color};margin:0;line-height:1;font-weight:600;opacity:0.6">${wins[pid]}</p><p style="font-size:11px;color:rgba(240,230,211,0.3);margin:2px 0 0;text-transform:uppercase;letter-spacing:1px">${PC[pid].name}</p></div>`).join("")}</div>`;
  const btn=el("button","","Tomorrow is another day...");btn.className="btn btn-ghost";btn.onclick=renderMain;
  inner.appendChild(btn);wrap.appendChild(inner);setRoot(wrap);
}

function makeHistoryTable(rows,player,o,pc,oc){
  const wrap=el("div","background:rgba(255,255,255,0.04);border:1px solid rgba(180,140,60,0.22);border-radius:14px;overflow:hidden;","");
  const hdr=el("div","display:grid;grid-template-columns:48px 1fr 1fr 60px 36px;padding:7px 12px;border-bottom:1px solid rgba(180,140,60,0.12);background:rgba(255,255,255,0.03);gap:4px;","");
  ["Date",PC.arif.name,PC.mere.name,"Result",""].forEach((h,i)=>{hdr.appendChild(el("span","font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:600;color:rgba(240,230,211,0.28);text-transform:uppercase;letter-spacing:1px;text-align:"+(i>=3?"right":"left")+";",h));});
  wrap.appendChild(hdr);
  if(!rows.length){wrap.appendChild(el("div","padding:20px;text-align:center;font-size:13px;color:rgba(240,230,211,0.3);","No entries yet!"));return wrap;}
  rows.forEach((row,i)=>{const rEl=el("div","");rEl.setAttribute("data-date",row.date);drawNormal(rEl,row,i,rows.length,player,o,pc,oc);wrap.appendChild(rEl);});
  return wrap;
}
function drawNormal(rEl,row,i,total,pl,o,pc,oc){
  rEl.innerHTML="";const iWon=row.winner===pl,isLast=i===total-1;
  const div=el("div",`display:grid;grid-template-columns:48px 1fr 1fr 60px 36px;align-items:center;padding:9px 12px;border-bottom:${isLast?"none":"1px solid rgba(180,140,60,0.08)"};background:${row.isToday?"rgba(251,191,36,0.04)":(i%2===0?"rgba(255,255,255,0.015)":"transparent")};gap:4px;`,"");
  const dc=el("div","","");dc.innerHTML=`<span style="font-size:12px;color:rgba(240,230,211,0.4)">${fmtDate(row.date)}</span>${row.isToday?`<span style="display:block;font-size:9px;color:#fbbf24;font-weight:500;text-transform:uppercase">Today</span>`:""}`;
  div.appendChild(dc);div.appendChild(el("span","font-size:13px;color:"+PC.arif.color+";font-weight:500;",fmtT(row.arif)));div.appendChild(el("span","font-size:13px;color:"+PC.mere.color+";font-weight:500;",fmtT(row.mere)));
  const bdg=el("div","text-align:right;","");bdg.innerHTML=`<span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;font-family:'Rajdhani',sans-serif;background:${iWon?pc.bg:oc.bg};color:${iWon?pc.color:oc.color}">${iWon?"W":"L"} ${diff(row.arif,row.mere)}</span>`;
  div.appendChild(bdg);
  const eb=el("button","background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;opacity:0.4;","✏️");eb.onclick=()=>drawEdit(rEl,row,i,total,pl,o,pc,oc);div.appendChild(eb);rEl.appendChild(div);
}
function drawEdit(rEl,row,i,total,pl,o,pc,oc){
  rEl.innerHTML="";const isLast=i===total-1;
  const wrap=el("div",`padding:14px 12px;border-bottom:${isLast?"none":"1px solid rgba(180,140,60,0.08)"};background:rgba(255,255,255,0.04);`,"");
  wrap.innerHTML=`<p style="margin:0 0 10px;font-size:12px;font-weight:500;color:rgba(240,230,211,0.35);font-family:'Rajdhani',sans-serif;">Editing ${fmtDate(row.date)}</p>`;
  const grid=el("div","display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;","");
  const aW=el("div","","");aW.innerHTML=`<label style="font-size:10px;color:${PC.arif.color};font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;font-family:'Rajdhani',sans-serif">Arif</label>`;
  const mW=el("div","","");mW.innerHTML=`<label style="font-size:10px;color:${PC.mere.color};font-weight:600;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px;font-family:'Rajdhani',sans-serif">Mere</label>`;
  const aI=document.createElement("input");aI.type="time";aI.value=row.arif||"";
  const mI=document.createElement("input");mI.type="time";mI.value=row.mere||"";
  aW.appendChild(aI);mW.appendChild(mI);grid.appendChild(aW);grid.appendChild(mW);wrap.appendChild(grid);
  const btns=el("div","display:flex;gap:7px;","");
  const sv=el("button","","Save");sv.className="btn btn-gold";sv.style.flex="1";
  const cn=el("button","","Cancel");cn.className="btn btn-ghost";cn.style.flex="1";
  const dl=el("button","","Delete");dl.className="btn btn-danger";
  sv.onclick=async()=>{
    if(!aI.value||!mI.value)return;sv.textContent="Saving...";sv.disabled=true;
    if(row.date===gameData.today.date)gameData.today={...gameData.today,arif:aI.value,mere:mI.value};
    else gameData.history=gameData.history.map(r=>r.date===row.date?{...r,arif:aI.value,mere:mI.value,winner:calcW(aI.value,mI.value)}:r);
    await saveData(gameData);renderMain();
  };
  cn.onclick=()=>drawNormal(rEl,row,i,total,pl,o,pc,oc);
  dl.onclick=()=>{
    const conf=el("div","margin-top:8px;padding:10px 12px;background:rgba(185,28,28,0.15);border-radius:7px;border:1px solid rgba(252,165,165,0.2);","");
    conf.innerHTML=`<p style="margin:0 0 8px;font-size:13px;color:#fca5a5;font-weight:500">Delete this entry?</p>`;
    const cr=el("div","display:flex;gap:7px;","");
    const y=el("button","","Yes, delete");y.className="btn btn-danger";y.style.flex="1";
    const n=el("button","","No");n.className="btn btn-ghost";n.style.flex="1";
    y.onclick=async()=>{
      if(row.date===gameData.today.date)gameData.today={date:gameData.today.date,arif:null,mere:null};
      else gameData.history=gameData.history.filter(r=>r.date!==row.date);
      await saveData(gameData);renderMain();
    };
    n.onclick=()=>conf.remove();cr.appendChild(y);cr.appendChild(n);conf.appendChild(cr);wrap.appendChild(conf);
  };
  btns.appendChild(sv);btns.appendChild(cn);btns.appendChild(dl);wrap.appendChild(btns);rEl.appendChild(wrap);
}

loadData();
</script>
